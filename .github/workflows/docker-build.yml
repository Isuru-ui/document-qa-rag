name: Docker Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: document-qa-rag
  DOCKER_TAG: latest

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name:  Checkout code
      uses: actions/checkout@v3
    
    - name:  Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name:  Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name:  Run basic tests
      run: |
        python -c "import fastapi; import chromadb; import groq; print('✅ All imports successful')"
    
    - name:  Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name:  Build Docker image
      run: |
        docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} .
    
    - name:  Test Docker image
      run: |
        docker run -d --name test-container \
          -p 8000:8000 \
          -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
          ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
       
        sleep 10
        
        curl -f http://localhost:8000/ || exit 1
        
      
        docker stop test-container
        docker rm test-container
    
    - name:  Docker image info
      run: |
        docker images ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
        echo " Docker build successful!"
    
    - name:  Success notification
      if: success()
      run: |
        echo "::notice:: Build and tests passed successfully!"
    
    - name:  Failure notification
      if: failure()
      run: |
        echo "::error:: Build or tests failed!"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name:  Checkout code
      uses: actions/checkout@v3
    
    - name:  Trigger Render Deploy
      run: |
        echo "Render auto-deploys from GitHub on push to main"
        echo " Deployment will start automatically on Render"